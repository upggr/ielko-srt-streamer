services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-https://streams.ioniantv.gr}
      - SERVER_IP=${SERVER_IP:-88.198.184.233}
      - MEDIAMTX_API=http://mediamtx:9997
    volumes:
      - db_data:/data
    depends_on:
      - mediamtx
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8890:8890/udp"   # SRT ingest
      - "1935:1935"       # RTMP ingest / restream
    expose:
      - "8888"            # HLS output (internal only)
      - "8889"            # WebRTC/WHEP (internal only — proxied via api)
      - "9997"            # REST API (internal only)
    environment:
      - MTX_LOGLEVEL=warn
      - MTX_HLSADDRESS=:8888
      - MTX_WEBRTCADDRESS=:8889
      - MTX_APIADDRESS=:9997
      - MTX_API=yes
      - MTX_HLSALWAYSREMUX=yes
      - MTX_HLSSEGMENTCOUNT=6
      - MTX_HLSSEGMENTDURATION=2s
      - MTX_READTIMEOUT=10s
      - MTX_WRITETIMEOUT=10s
      - MTX_WRITEQUEUESIZE=512
    restart: unless-stopped

volumes:
  db_data:
