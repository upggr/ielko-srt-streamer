services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - HLS_DIR=/hls
      # Optional overrides — auto-generated on first boot if not set
      - APP_PASSWORD=${APP_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      # Host .env from dashboard install sets these — must be forwarded into the container
      # so bootstrap can set PUBLIC_URL / domain / ssl (Caddy hostname is not visible to Node otherwise).
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - SERVER_IP=${SERVER_IP:-}
      - TRUST_PROXY=${TRUST_PROXY:-}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - MEDIAMTX_API=http://mediamtx:9997
      - MEDIAMTX_HLS=http://mediamtx:8888
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_VALIDATE_URL=${LICENSE_VALIDATE_URL:-https://services.buy-it.gr/api/license/validate}
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:-}
    volumes:
      - db_data:/data
      - hls_data:/hls
      - .:/repo                          # repo root for self-update (writes update.flag)
    depends_on:
      - mediamtx
      - hls-nginx
      - icecast
    restart: unless-stopped

  hls-nginx:
    image: nginx:alpine
    expose:
      - "8080"
    volumes:
      - hls_data:/usr/share/nginx/html:ro
    command: >
      sh -c "printf 'server{listen 8080;location /{root /usr/share/nginx/html;add_header Cache-Control no-cache;add_header Access-Control-Allow-Origin *;try_files \$$uri \$$uri/ =404;}}' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped

  icecast:
    build:
      context: ./icecast
      dockerfile: Dockerfile
    ports:
      - "8000:8000"       # Icecast source + listener port
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:-}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD:-}
      - ICECAST_HOSTNAME=${PUBLIC_HOST:-localhost}
      - ICECAST_ADMIN_EMAIL=${LETSENCRYPT_EMAIL:-icemaster@localhost}
    volumes:
      - icecast_log:/var/log/icecast2
    restart: unless-stopped

  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    ports:
      - "8890:8890/udp"   # SRT ingest
      - "1935:1935"       # RTMP ingest / restream
    expose:
      - "8888"            # HLS output (internal only)
      - "8889"            # WebRTC/WHEP (internal only — proxied via api)
      - "9997"            # REST API (internal only)
    restart: unless-stopped

volumes:
  db_data:
  hls_data:
  icecast_log:
