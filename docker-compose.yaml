services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - HLS_DIR=/hls
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-https://streams.ioniantv.gr}
      - SERVER_IP=${SERVER_IP:-88.198.184.233}
      - MEDIAMTX_API=http://mediamtx:9997
      - MEDIAMTX_HLS=http://mediamtx:8888
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_VALIDATE_URL=${LICENSE_VALIDATE_URL:-https://services.buy-it.gr/api/license/validate}
    volumes:
      - db_data:/data
      - hls_data:/hls
    depends_on:
      - mediamtx
      - hls-nginx
    restart: unless-stopped

  hls-nginx:
    image: nginx:alpine
    expose:
      - "8080"
    volumes:
      - hls_data:/usr/share/nginx/html:ro
    command: >
      sh -c "printf 'server{listen 8080;location /{root /usr/share/nginx/html;add_header Cache-Control no-cache;add_header Access-Control-Allow-Origin *;try_files \$$uri \$$uri/ =404;}}' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped

  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    ports:
      - "8890:8890/udp"   # SRT ingest
      - "1935:1935"       # RTMP ingest / restream
    expose:
      - "8888"            # HLS output (internal only)
      - "8889"            # WebRTC/WHEP (internal only — proxied via api)
      - "9997"            # REST API (internal only)
    restart: unless-stopped

volumes:
  db_data:
  hls_data:
