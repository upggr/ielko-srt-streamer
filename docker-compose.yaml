services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
      - "10000-11000:10000-11000/udp"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - HLS_DIR=/hls
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-https://streams.ioniantv.gr}
      - SRT_PORT_MIN=10000
      - SRT_PORT_MAX=11000
      - SERVER_IP=${SERVER_IP:-88.198.184.233}
    volumes:
      - db_data:/data
      - hls_data:/hls
    depends_on:
      - hls-nginx
    restart: unless-stopped

  hls-nginx:
    image: nginx:alpine
    expose:
      - "8080"
    volumes:
      - hls_data:/usr/share/nginx/html:ro
    command: >
      sh -c "printf 'server {\n  listen 8080;\n  location / {\n    root /usr/share/nginx/html;\n    add_header Cache-Control no-cache;\n    add_header Access-Control-Allow-Origin *;\n    types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; application/dash+xml mpd; }\n  }\n}\n' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped

volumes:
  db_data:
  hls_data:
