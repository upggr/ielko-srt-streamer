services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
      - "10000-11000:10000-11000/udp"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - HLS_DIR=/hls
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-https://streams.ioniantv.gr}
      - SRT_PORT_MIN=10000
      - SRT_PORT_MAX=11000
      - SERVER_IP=${SERVER_IP:-88.198.184.233}
    volumes:
      - db_data:/data
      - hls_data:/hls
    depends_on:
      - hls-nginx
    restart: unless-stopped

  hls-nginx:
    image: nginx:alpine
    expose:
      - "8080"
    volumes:
      - ./nginx/hls-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hls_data:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  db_data:
  hls_data:
