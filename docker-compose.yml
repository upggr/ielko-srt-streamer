services:
  nginx:
    image: nginx:alpine
    ports:
      - "666:666"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - hls-nginx
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "3000"
    ports:
      - "10000-11000:10000-11000/udp"
    environment:
      - PORT=3000
      - DB_PATH=/data/streams.db
      - HLS_DIR=/hls
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - PUBLIC_URL=https://streams.upg.gr:666
      - SRT_PORT_MIN=10000
      - SRT_PORT_MAX=11000
      - SERVER_IP=157.90.171.7
    volumes:
      - db_data:/data
      - hls_data:/hls
    restart: unless-stopped

  hls-nginx:
    image: nginx:alpine
    expose:
      - "8080"
    volumes:
      - ./nginx/hls-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hls_data:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  db_data:
  hls_data:
