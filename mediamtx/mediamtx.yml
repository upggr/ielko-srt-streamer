logLevel: info

api: yes
apiAddress: :9997

# Allow any path to be created dynamically when a publisher connects
paths:
  all_others:

hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: fmp4
hlsSegmentCount: 6
hlsSegmentDuration: 2s

webrtcAddress: :8889

srtAddress: :8890

rtmpAddress: :1935

# Viewers (HLS, WebRTC, SRT pull) need no credentials.
# Publishers must supply per-path credentials set by the API (srtPublishPassphrase / publishUser+publishPass).
# The API itself authenticates via the internal network (not exposed publicly).
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: read
        path:
      - action: playback
        path:
      - action: api
      - action: metrics
